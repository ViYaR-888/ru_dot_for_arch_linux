# Настройка для внешнего монитора
monitor = HDMI-A-1, 2560x1440@120, 1536x0, 1

# Настройка для экрана ноутбука
monitor = eDP-1, 1920x1080@60, 0x0, 1.25

exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
env = ELECTRON_OZONE_PLATFORM_HINT, wayland
env = XDG_SESSION_TYPE, wayland
env = GTK_THEME,catppuccin-mocha-mauve-standard+default
env = GTK_ICON_THEME,Papirus-Dark
env = XCURSOR_THEME,Papirus-Dark
env = XCURSOR_SIZE,24

env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_STYLE_OVERRIDE,kvantum

$mainMod = SUPER
$terminal = kitty
$fileManager = thunar

# Стабильная цепочка автозапуска: сначала бар, затем апплеты в его готовый трей
exec-once = waybar > /dev/null 2>&1 &
exec-once = bash -c "sleep 2; nm-applet --indicator > /dev/null 2>&1 &"
exec-once = bash -c "sleep 3; blueman-applet > /dev/null 2>&1 &"

exec-once = dunst
exec-once = swaybg -m fill -i /home/v/Pictures/Wallpapers/room.jpg
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec-once = wl-paste --type text --watch cliphist store &
exec-once = wl-paste --type image --watch cliphist store &

bind = $mainMod, Space, exec, $terminal

bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager

#... (остальная часть вашего конфига ниже)
bind = $mainMod, L, exec, ~/.config/hypr/powermenu.sh
bind = $mainMod, V, exec, cliphist list | rofi -dmenu -p "Clipboard" -theme catppuccin-mocha | cliphist decode | wl-copy
bind = $mainMod, R, exec, rofi -show drun -theme catppuccin-mocha

bind = $mainMod, F, exec, firefox
bind = $mainMod, T, exec, Telegram
bind = $mainMod, D, exec, vesktop
bind = $mainMod, O, exec, onlyoffice-desktopeditors
bind = $mainMod, S, exec, steam
bind = $mainMod, G, exec, java -jar /home/v/Downloads/LegacyLauncher.jar
bind = $mainMod, Escape, exec, kitty --class btop -e btop

bind = , print, exec, name="/home/v/Pictures/Screenshots/screen_$(date +%Y%m%d_%H%M%S).png" && grim -g "$(slurp)" "$name" && wl-copy < "$name" && notify-send -i "$name" "Скрин создан, братишка" "Ищи тута: Pictures/Screenshots"

input {
     kb_layout = us,ru
     kb_options = grp:caps_toggle
}

general {
    border_size = 0
    gaps_in = 5
    gaps_out = 10
    layout = dwindle
}

decoration {
    rounding = 12
    active_opacity = 1.0
    inactive_opacity = 1.0
    dim_inactive = false

    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(1a1a1aee)
        color_inactive = rgba(00000000)
    }

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
    }
}

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, Z, movewindow
bindm = $mainMod, mouse:273, resizewindow

windowrulev = float, class:gsimplecal
windowrulev = size 300 260, class:gsimplecal
windowrulev = move 50% 36, class:gsimplecal
windowrulev = noborder, class:gsimplecal
windowrulev = nomove, class:gsimplecal
windowrulev = noresize, class:gsimplecal
