# External monitor configuration
monitor = HDMI-A-1, 2560x1440@120, 1536x0, 1

# Laptop screen configuration
monitor = eDP-1, 1920x1080@60, 0x0, 1.25

exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
env = ELECTRON_OZONE_PLATFORM_HINT, wayland
env = XDG_SESSION_TYPE, wayland
env = GTK_THEME,catppuccin-mocha-mauve-standard+default
env = GTK_ICON_THEME,Papirus-Dark
env = XCURSOR_THEME,Papirus-Dark
env = XCURSOR_SIZE,24

env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_STYLE_OVERRIDE,kvantum

$mainMod = SUPER
$terminal = kitty
$fileManager = thunar

# Stable autostart chain: waybar first, then tray applets
exec-once = waybar > /dev/null 2>&1 &
exec-once = bash -c "sleep 2; nm-applet --indicator > /dev/null 2>&1 &"
exec-once = bash -c "sleep 3; blueman-applet > /dev/null 2>&1 &"

exec-once = dunst
exec-once = swaybg -m fill -i $HOME/Pictures/Wallpapers/room.jpg
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec-once = wl-paste --type text --watch cliphist store &
exec-once = wl-paste --type image --watch cliphist store &

# Basic application bindings
bind = $mainMod, Space, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, Q, exec, ~/.config/hypr/powermenu.sh
bind = $mainMod, V, exec, cliphist list | rofi -dmenu -p "Clipboard" -theme catppuccin-mocha | cliphist decode | wl-copy
bind = $mainMod, R, exec, rofi -show drun -theme catppuccin-mocha

# Application launchers
bind = $mainMod, F, exec, firefox
bind = $mainMod, T, exec, Telegram
bind = $mainMod, D, exec, vesktop
bind = $mainMod, O, exec, onlyoffice-desktopeditors
bind = $mainMod, S, exec, steam
bind = $mainMod, G, exec, java -jar $HOME/Downloads/LegacyLauncher.jar
bind = $mainMod, Escape, exec, kitty --class btop -e btop

# Screenshot
bind = , print, exec, name="$HOME/Pictures/Screenshots/screen_$(date +%Y%m%d_%H%M%S).png" && grim -g "$(slurp)" "$name" && wl-copy < "$name" && notify-send -i "$name" "Screenshot created" "Saved to Pictures/Screenshots"

# Window focus (Vim style)
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Swap windows
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d

# Workspace navigation (dynamic, GNOME-like)
bind = $mainMod ALT, left, workspace, -1
bind = $mainMod ALT, right, workspace, +1
bind = $mainMod SHIFT ALT, left, movetoworkspace, -1
bind = $mainMod SHIFT ALT, right, movetoworkspace, +1

# Resize submap with full keyboard grab and notifications
bind = $mainMod, X, exec, bash -c "notify-send -t 1500 'Resize mode' 'hjkl: resize | Esc: exit' && hyprctl dispatch submap resize"
submap = resize
bind = , h, resizeactive, -20 0
bind = , l, resizeactive, 20 0
bind = , k, resizeactive, 0 -20
bind = , j, resizeactive, 0 20
bind = , escape, exec, bash -c "notify-send -t 1000 'Resize mode' 'Exited' && hyprctl dispatch submap reset"
# Block all other keys while in resize mode
bind = , catchall, exec, true
submap = reset

# Fullscreen toggle
bind = , F10, fullscreen, 1
bind = , F11, fullscreen, 1

# Mouse bindings (window moving/resizing)
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

input {
     kb_layout = us,ru
     kb_options = grp:caps_toggle
}

general {
    border_size = 0
    gaps_in = 5
    gaps_out = 10
    layout = dwindle
}

decoration {
    rounding = 12
    active_opacity = 1.0
    inactive_opacity = 1.0
    dim_inactive = false

    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(1a1a1aee)
        color_inactive = rgba(00000000)
    }

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
    }
}

animations {
    enabled = yes

    # Fast and snappy default
    bezier = fast, 0.0, 0.8, 0.2, 1.0
    animation = windows, 1, 4, fast, slide
    animation = windowsOut, 1, 4, fast, slide
    animation = windowsMove, 1, 4, fast
    animation = border, 1, 4, fast
    animation = fade, 1, 4, fast
    animation = workspaces, 1, 3, fast, slide
}

windowrulev = float, class:gsimplecal
windowrulev = size 300 260, class:gsimplecal
windowrulev = move 50% 36, class:gsimplecal
windowrulev = noborder, class:gsimplecal
windowrulev = nomove, class:gsimplecal
windowrulev = noresize, class:gsimplecal
