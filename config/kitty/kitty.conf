# === Фиксы запуска и багов ===
# Железный запуск Zsh по умолчанию вместо Bash
shell /usr/bin/zsh

# Отключение надоедливого подтверждения закрытия окна (0 — закрывать сразу)
confirm_os_window_close 0

# Полная очистка буфера по Ctrl+L (скролл вверх больше не покажет старый текст)
scrollback_lines 10000
map ctrl+l combine : clear_terminal scrollback active : send_text normal,application \x0c

# Настройки структуры окна
remember_window_size  no
initial_width         950
initial_height         550
dynamic_background_opacity yes

# === Кастомизация ===
background_opacity 0.85
window_padding_width 12

font_family      GeistMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0
disable_ligatures never

# === Цвета темы (Catppuccin Mocha) ===
foreground            #CDD6F4
background            #1E1E2E
selection_foreground  #1E1E2E
selection_background  #F5E0DC
url_color             #F5E0DC
cursor                #F5E0DC
cursor_text_color     #1E1E2E

# Цвета вкладок
active_tab_foreground   #11111B
active_tab_background   #CBA6F7
inactive_tab_foreground #CDD6F4
inactive_tab_background #181825

# Цвета терминала
color0 #45475A
